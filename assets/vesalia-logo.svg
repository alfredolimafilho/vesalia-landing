        fill="#0A0A0A">VESALIA</text>

  <!-- Régua técnica (tributo Vesalius) -->
  <g transform="translate(380, 335)">
    <line x1="0" y1="0" x2="440" y2="0" stroke="#0A0A0A" stroke-width="1.3"/>
    <line x1="0" y1="-9" x2="0" y2="9" stroke="#0A0A0A" stroke-width="1.3"/>
    <line x1="55" y1="-4" x2="55" y2="4" stroke="#0A0A0A" stroke-width="0.9"/>
    <line x1="110" y1="-6" x2="110" y2="6" stroke="#0A0A0A" stroke-width="1.1"/>
    <line x1="165" y1="-4" x2="165" y2="4" stroke="#0A0A0A" stroke-width="0.9"/>
    <line x1="220" y1="-7" x2="220" y2="7" stroke="#0A0A0A" stroke-width="1.2"/>
    <line x1="275" y1="-4" x2="275" y2="4" stroke="#0A0A0A" stroke-width="0.9"/>
    <line x1="330" y1="-6" x2="330" y2="6" stroke="#0A0A0A" stroke-width="1.1"/>
    <line x1="385" y1="-4" x2="385" y2="4" stroke="#0A0A0A" stroke-width="0.9"/>
    <line x1="440" y1="-9" x2="440" y2="9" stroke="#0A0A0A" stroke-width="1.3"/>
  </g>

  <!-- Descritor -->
  <text x="600" y="400"
